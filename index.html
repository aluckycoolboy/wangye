<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UE5第一个项目的开发网友</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        background-color: #eee;
      }
      /* * {
        border: 1px solid black;
      } */
      .flex {
        display: flex;
      }
      .baise{
        background-color: white;
      }
      .flex1{
        flex:1;
      }
      .column{
        flex-direction: column;
      }
      .mg8{
        margin: 8px;
      }
      .mgr8{
        margin-right: 8px;
      }
      .mgt8{
        margin-top:8px;
      }
      .daohang{
        padding:10px 20px;
        border-bottom:1px solid grey;
        font-size:14px;
        color:#666;
      }
      @media(max-width:600px){
        .cebian{
          display: none;
        }
        .neirong{
          flex-direction: column;
        }
        .youqu{
          margin-left: 8px;
        }
        .neirongset{
          margin:0 0px;
          flex:auto;
        }
      }

    </style>
  </head>
  <body class="flex">
    <!--侧边栏-->
    <div style="width:200px;z-index: 1;"class="baise cebian">
      <!--头像栏-->
      <div style="padding:10px;align-items:center;justify-content:center;border-bottom:1px solid #999"class="flex">
     <img
      src="gg.png"
      width="40px"
      height="40px"
      alt=""> 
       <div>游戏测试</div>
      </div>
      <!--导航条-->
      <div class="flex column">
        <div class="daohang">角色</div>
        <div class="daohang">技能</div>
        <div class="daohang">怪物</div>
        <div class="daohang">地图</div>
        <div class="daohang">攻略</div>
      </div>
      
    </div>
    <!--主内容区-->
    <div class="flex1 flex column">
      <!--头部-->
      <div style="height: 60px;z-index: 1;align-items:center;justify-content:center;border-bottom:1px solid #999;"class="flex baise">欢迎来到北欧战争</div>
       <!--内容区-->
      <div style="overflow: auto"class="flex1 flex neirong">
        <!--左区-->
        <div style="flex:3;"class="flex column mg8">
          <!--左区头部-->
          <div class="flex">
            <!--头内容-->
            <div style="height:  160px;"class="flex1 baise mgr8 baise"></div>
            <!--头内容-->
            <div style="height:  160px;"class="flex1 baise mgr8 baise"></div>
             <!--头内容-->
            <div style="height:  160px;"class="flex1 baise mgr8 baise"></div>
            <!--头内容-->
            <div style="height: 160px;"class="flex1 baise mgr8 baise"></div>
          </div>
          <!--左区内容-->
          <div class="flex1 flex column neirong neirongset">
            <!--内容1-->
          <div style="height: 180px;"class="mgt8 baise"></div>
               <!--内容2-->
          <div style="height: 180px;"class="mgt8 baise"></div>
               <!--内容3-->
          <div style="height: 180px;"class="mgt8 baise"></div>
               <!--内容4-->
          <div style="height: 180px;"class="mgt8 baise"></div>
               <!--内容5-->
          <div style="height: 180px;"class="mgt8 baise"></div>
                <!--内容6-->
          <div style="height: 180px;"class="mgt8 baise"></div>
         </div>
        </div>
          <!--右区-->
        <div style="flex:1;"class="youqu flex1 flex column mgr8 mgt8">
          <!--右区上-->
          <div style="height: 250px;"class="baise"></div>
          <!--右区下-->
          <div style="flex:1"class="baise mgt8 mgr 8"></div>
      </div>
    </div>
  </body>
</html>
